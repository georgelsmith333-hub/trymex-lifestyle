databases:
  - name: trynex-db
    plan: free
    databaseName: trynex
    user: trynex

services:
  - type: web
    name: trynex-api
    plan: free
    runtime: node
    buildCommand: chmod +x scripts/render-build.sh && bash scripts/render-build.sh
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: trynex-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
