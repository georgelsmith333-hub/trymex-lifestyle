<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#E85D04" />
  <title>Offline — TryNex Lifestyle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background: #fff8f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #E85D04, #FB8500);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
      font-weight: 900;
      color: white;
    }
    h1 { font-size: 1.75rem; font-weight: 900; color: #111827; margin-bottom: 0.75rem; }
    p { color: #6b7280; font-size: 1rem; line-height: 1.6; max-width: 360px; margin: 0 auto 2rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      border-radius: 0.875rem;
      background: linear-gradient(135deg, #E85D04, #FB8500);
      color: white;
      font-weight: 800;
      font-size: 0.9375rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(232,93,4,0.35);
    }
    .wifi {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
    }
  </style>
</head>
<body>
  <span class="wifi">📶</span>
  <div class="logo">T</div>
  <h1>You're Offline</h1>
  <p>It looks like you've lost your internet connection. Please check your connection and try again.</p>
  <button class="btn" onclick="location.reload()">Try Again</button>
</body>
</html>
